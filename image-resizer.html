<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Image Resizer — ImageTools</title>
<meta name="description" content="Resize images online for free. Custom width & height, maintain aspect ratio. Pure browser-side, no upload needed.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#14141f;--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);--accent:#6c5ce7;--accent2:#a855f7;--text:#e2e8f0;--text2:#94a3b8;--radius:16px;--glow:0 0 20px rgba(108,92,231,0.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(108,92,231,0.08),transparent 50%),radial-gradient(circle at 70% 80%,rgba(168,85,247,0.06),transparent 50%);z-index:-1}
header{backdrop-filter:blur(20px);background:rgba(10,10,15,0.8);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
nav{display:flex;gap:0.5rem;flex-wrap:wrap}
nav a{color:var(--text2);text-decoration:none;padding:0.4rem 0.8rem;border-radius:8px;font-size:0.85rem;transition:all 0.2s}
nav a:hover,nav a.active{background:var(--glass);color:var(--text)}
.container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
h1{text-align:center;font-size:1.8rem;margin-bottom:1.5rem;background:linear-gradient(135deg,#fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:3rem;text-align:center;cursor:pointer;transition:all 0.3s;background:var(--glass);backdrop-filter:blur(12px);margin-bottom:1.5rem}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);box-shadow:var(--glow)}
.drop-zone.drag-over{background:rgba(108,92,231,0.1)}
.drop-zone p{color:var(--text2);font-size:1rem}
.drop-zone .icon{font-size:3rem;display:block;margin-bottom:1rem}
.controls{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;display:none}
.controls .row{display:flex;gap:1rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.controls label{color:var(--text2);font-size:0.9rem;min-width:80px}
.controls input[type=number]{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.8rem;color:var(--text);font-size:0.95rem;width:120px}
.controls input[type=number]:focus{outline:none;border-color:var(--accent)}
.controls input[type=checkbox]{accent-color:var(--accent)}
.btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:0.7rem 1.5rem;border-radius:10px;cursor:pointer;font-size:0.95rem;font-weight:600;transition:all 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:var(--glow)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.preview{text-align:center;margin:1.5rem 0}
.preview img,.preview canvas{max-width:100%;max-height:400px;border-radius:12px;border:1px solid var(--border)}
.info{color:var(--text2);font-size:0.85rem;margin-top:0.5rem}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent);color:#fff;padding:0.8rem 1.5rem;border-radius:10px;font-size:0.9rem;transition:transform 0.3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
.spinner{display:none;width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:2rem;color:var(--text2);font-size:0.85rem;border-top:1px solid var(--border);margin-top:3rem}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){h1{font-size:1.4rem}.controls .row{flex-direction:column;align-items:stretch}.controls input[type=number]{width:100%}header{padding:0.8rem 1rem}nav a{font-size:0.75rem;padding:0.3rem 0.5rem}}
</style></head><body>
<header>
  <a href="index.html" class="logo">🖼️ ImageTools</a>
  <nav>
    <a href="image-resizer.html" class="active">Resize</a>
    <a href="image-cropper.html">Crop</a>
    <a href="image-compressor.html">Compress</a>
    <a href="image-to-base64.html">Base64</a>
    <a href="image-filters.html">Filters</a>
    <a href="color-extractor.html">Color</a>
    <a href="svg-to-png.html">SVG→PNG</a>
  </nav>
</header>
<div class="container">
  <h1>📐 Image Resizer</h1>
  <div class="drop-zone" id="dropZone">
    <span class="icon">📂</span>
    <p>Drag & drop an image here, or click to select</p>
    <input type="file" accept="image/*" id="fileInput" style="display:none">
  </div>
  <div class="controls" id="controls">
    <div class="row">
      <label>Width:</label>
      <input type="number" id="width" min="1" max="10000">
      <label>Height:</label>
      <input type="number" id="height" min="1" max="10000">
    </div>
    <div class="row">
      <label><input type="checkbox" id="lockRatio" checked> Maintain aspect ratio</label>
    </div>
    <div class="row">
      <button class="btn" id="resizeBtn">Resize & Download</button>
    </div>
    <p class="info" id="origInfo"></p>
  </div>
  <div class="spinner" id="spinner"></div>
  <div class="preview" id="preview"></div>
</div>
<footer>
  <p><a href="index.html">← Back to all tools</a></p>
  <p style="margin-top:0.5rem">
    <a href="image-resizer.html">Resize</a> · <a href="image-cropper.html">Crop</a> · <a href="image-compressor.html">Compress</a> · <a href="image-to-base64.html">Base64</a> · <a href="image-filters.html">Filters</a> · <a href="color-extractor.html">Color</a> · <a href="svg-to-png.html">SVG→PNG</a>
  </p>
</footer>
<div class="toast" id="toast"></div>
<script>
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),controls=document.getElementById('controls'),wInput=document.getElementById('width'),hInput=document.getElementById('height'),lockRatio=document.getElementById('lockRatio'),resizeBtn=document.getElementById('resizeBtn'),preview=document.getElementById('preview'),origInfo=document.getElementById('origInfo'),spinner=document.getElementById('spinner'),toast=document.getElementById('toast');
let origImg=null,ratio=1;
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2500)}
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadImage(e.target.files[0])});
function loadImage(file){
  const img=new Image();img.onload=()=>{
    origImg=img;ratio=img.width/img.height;
    wInput.value=img.width;hInput.value=img.height;
    origInfo.textContent=`Original: ${img.width} × ${img.height}px`;
    controls.style.display='block';
    preview.innerHTML='';preview.appendChild(img);
    showToast('Image loaded!');
  };img.src=URL.createObjectURL(file);
}
wInput.addEventListener('input',()=>{if(lockRatio.checked&&origImg)hInput.value=Math.round(wInput.value/ratio)});
hInput.addEventListener('input',()=>{if(lockRatio.checked&&origImg)wInput.value=Math.round(hInput.value*ratio)});
resizeBtn.addEventListener('click',()=>{
  if(!origImg)return;
  const w=parseInt(wInput.value),h=parseInt(hInput.value);
  if(!w||!h||w<1||h<1){showToast('Please enter valid dimensions');return}
  spinner.style.display='block';
  setTimeout(()=>{
    const c=document.createElement('canvas');c.width=w;c.height=h;
    const ctx=c.getContext('2d');ctx.drawImage(origImg,0,0,w,h);
    c.toBlob(blob=>{
      spinner.style.display='none';
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`resized_${w}x${h}.png`;a.click();
      URL.revokeObjectURL(url);
      showToast(`✅ Resized to ${w}×${h} and downloaded!`);
    },'image/png');
  },100);
});
</script></body></html>
